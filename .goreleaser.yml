version: 2

before:
  hooks:
    - go mod download

builds:
  - id: cocoon-agent-debug
    binary: cocoon-agent.dbg
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X github.com/cocoonstack/cocoon-agent/version.REVISION={{.Commit}}
      - -X github.com/cocoonstack/cocoon-agent/version.VERSION={{.Env.VERSION}}
      - -X github.com/cocoonstack/cocoon-agent/version.BUILTAT={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: .

  - id: cocoon-agent-linux
    binary: cocoon-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -X github.com/cocoonstack/cocoon-agent/version.REVISION={{.Commit}}
      - -X github.com/cocoonstack/cocoon-agent/version.VERSION={{.Env.VERSION}}
      - -X github.com/cocoonstack/cocoon-agent/version.BUILTAT={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: .

  - id: cocoon-agent-windows
    binary: cocoon-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s
      - -X github.com/cocoonstack/cocoon-agent/version.REVISION={{.Commit}}
      - -X github.com/cocoonstack/cocoon-agent/version.VERSION={{.Env.VERSION}}
      - -X github.com/cocoonstack/cocoon-agent/version.BUILTAT={{.Date}}
    goos:
      - windows
    goarch:
      - amd64
    main: .

archives:
  - id: release
    builds:
      - cocoon-agent-linux
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

  - id: release-windows
    builds:
      - cocoon-agent-windows
    formats: [zip]
    files:
      - packaging/install-cocoon-agent.ps1
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end -}}

  - id: debug
    builds:
      - cocoon-agent-debug
    name_template: >-
      {{- .ProjectName }}_{{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}_debug
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

  # Unversioned aliases so releases/latest/download/cocoon-agent_{Linux,Windows}_x86_64 resolve.
  - id: release-latest
    builds:
      - cocoon-agent-linux
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}

  - id: release-windows-latest
    builds:
      - cocoon-agent-windows
    formats: [zip]
    files:
      - packaging/install-cocoon-agent.ps1
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end -}}

checksum:
  name_template: 'checksums.txt'

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
